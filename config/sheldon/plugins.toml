# -------------------------------------------------------------------
# Sheldon Configuration
# -------------------------------------------------------------------
shell = "zsh"

[plugins]

# NOTE: compinit is handled in .zshrc with daily caching optimization
# Plugins can call compdef before compinit - zsh queues these definitions

[plugins.zsh-defer]
github = "romkatv/zsh-defer"

[templates]
defer = '''
{{ hooks?.pre | nl }}{% for file in files %}zsh-defer source "{{ file }}"
{% endfor %}{{ hooks?.post | nl }}'''

# -------------------------------------------------------------------
# starship/starship (signature-based cache invalidation + fast profile)
# -------------------------------------------------------------------
[plugins.starship]
inline = '''
_starship_file_signature() {
    local file="$1"
    local sig

    [[ -n "$file" && -e "$file" ]] || return 1
    sig="$(stat -Lc '%Y:%s' "$file" 2>/dev/null)" || sig="$(stat -Lf '%m:%z' "$file" 2>/dev/null)" || return 1
    print -r -- "$file:$sig"
}

_starship_init_cached() {
    local cache_dir="${XDG_CACHE_HOME:-$HOME/.cache}/zsh"
    local cache_file="$cache_dir/starship_init.zsh"
    local signature_file="$cache_dir/starship_init.signature"
    local profile="${STARSHIP_PROFILE:-default}"
    local config_home="${XDG_CONFIG_HOME:-$HOME/.config}"
    local default_config="$config_home/starship.toml"
    local fast_config="$config_home/starship-fast.toml"
    local config_file="${STARSHIP_CONFIG:-$default_config}"
    local current_signature
    local starship_bin

    if [[ "$profile" == "fast" && -z "${STARSHIP_CONFIG:-}" && -r "$fast_config" ]]; then
        config_file="$fast_config"
    fi

    if [[ -r "$config_file" ]]; then
        export STARSHIP_CONFIG="$config_file"
    fi

    starship_bin="$(command -v starship 2>/dev/null)" || return
    current_signature="$(_starship_file_signature "$starship_bin")" || return
    current_signature="${current_signature}|profile=${profile}"

    if [[ -f "$cache_file" && -f "$signature_file" ]]; then
        if [[ "$current_signature" == "$(<"$signature_file")" ]]; then
            source "$cache_file"
            return
        fi
    fi

    mkdir -p "$cache_dir"
    starship init zsh --print-full-init > "$cache_file"
    print -r -- "$current_signature" > "$signature_file"
    source "$cache_file"
}
_starship_init_cached
unset -f _starship_file_signature _starship_init_cached
'''

# -------------------------------------------------------------------
# mise version manager (https://mise.jdx.dev/)
# -------------------------------------------------------------------
[plugins.mise]
inline = '''
_mise_file_signature() {
  local file="$1"
  local sig

  [[ -n "$file" && -e "$file" ]] || return 1
  sig="$(stat -Lc '%Y:%s' "$file" 2>/dev/null)" || sig="$(stat -Lf '%m:%z' "$file" 2>/dev/null)" || return 1
  print -r -- "$file:$sig"
}

_mise_activate_cached() {
  local cache_dir="${XDG_CACHE_HOME:-$HOME/.cache}/zsh"
  local startup_mode="${MISE_STARTUP_MODE:-default}"
  local cache_file="$cache_dir/mise_activate_${startup_mode}.zsh"
  local signature_file="$cache_dir/mise_activate_${startup_mode}.signature"
  local mise_bin
  local current_signature

  mise_bin="$(command -v mise 2>/dev/null)" || return
  current_signature="$(_mise_file_signature "$mise_bin")|mode=${startup_mode}" || return

  if [[ -f "$cache_file" && -f "$signature_file" ]]; then
    if [[ "$current_signature" == "$(<"$signature_file")" ]]; then
      source "$cache_file"
      return
    fi
  fi

  mkdir -p "$cache_dir"
  if [[ "$startup_mode" == "fast" ]]; then
    mise activate zsh --no-hook-env > "$cache_file"
  else
    mise activate zsh > "$cache_file"
  fi
  print -r -- "$current_signature" > "$signature_file"
  source "$cache_file"
}

if ! command -v mise >/dev/null 2>&1; then
  echo "mise not found, installing..."
  curl -fsSL https://mise.run | sh
  export PATH="$HOME/.local/bin:$PATH"
fi
# Eager activation with local signature-based cache
if command -v mise >/dev/null 2>&1; then
  _mise_activate_cached
fi
unset -f _mise_file_signature _mise_activate_cached
'''

# -------------------------------------------------------------------
# ohmyzsh/ohmyzsh plugin: ssh-agent
# -------------------------------------------------------------------
[plugins.ohmyzsh-plugins]
github = "ohmyzsh/ohmyzsh"
dir = "plugins"
use = [
  "ssh-agent/*.plugin.zsh",
]

# -------------------------------------------------------------------
# zsh-users/zsh-history-substring-search (deferred)
# -------------------------------------------------------------------
[plugins.zsh-history-substring-search]
github = "zsh-users/zsh-history-substring-search"
use = ["zsh-history-substring-search.zsh"]
apply = ["defer"]

# -------------------------------------------------------------------
# junegunn/fzf pinned to v0.70.0
# -------------------------------------------------------------------
# Keep a single integration strategy: source static scripts from /shell
# and inject PATH once via the dedicated bin plugin.
[plugins."fzf-clone"]
github = "junegunn/fzf"
tag = "v0.70.0"
use = ["shell/completion.zsh", "shell/key-bindings.zsh"]

[plugins."fzf-bin"]
github = "junegunn/fzf"
tag = "v0.70.0"
dir = "bin"
apply = ["PATH"]

# -------------------------------------------------------------------
# unixorn/fzf-zsh-plugin (kind:defer equivalent)
# -------------------------------------------------------------------
# [plugins."fzf-zsh-plugin"]
# github = "unixorn/fzf-zsh-plugin"
# apply = ["defer"]

# -------------------------------------------------------------------
# Aloxaf/fzf-tab (deferred - loads after first prompt)
# -------------------------------------------------------------------
[plugins."fzf-tab"]
github = "Aloxaf/fzf-tab"
use = ["fzf-tab.plugin.zsh"]
apply = ["defer"]

# -------------------------------------------------------------------
# zdharma-continuum/fast-syntax-highlighting (kind:defer)
# -------------------------------------------------------------------
[plugins."fast-syntax-highlighting"]
github = "zdharma-continuum/fast-syntax-highlighting"
use = ["fast-syntax-highlighting.plugin.zsh"]
apply = ["defer"]

# -------------------------------------------------------------------
# zsh-users/zsh-autosuggestions (kind:defer)
# -------------------------------------------------------------------
[plugins."zsh-autosuggestions"]
github = "zsh-users/zsh-autosuggestions"
use = ["zsh-autosuggestions.zsh"]
apply = ["defer"]

# -------------------------------------------------------------------
# MichaelAquilina/zsh-autoswitch-virtualenv (deferred)
# -------------------------------------------------------------------
[plugins."zsh-autoswitch-virtualenv"]
github = "MichaelAquilina/zsh-autoswitch-virtualenv"
use = ["autoswitch_virtualenv.plugin.zsh"]
apply = ["defer"]
